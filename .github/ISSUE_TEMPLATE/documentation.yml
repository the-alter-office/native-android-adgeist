name: 📖 Documentation
description: Report an issue with or suggest an improvement to the documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Found something missing, unclear, or incorrect in the docs? Let us know.
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Link or path to the affected documentation (e.g. README section, code comment, API docs).
      placeholder: "e.g. README.md → STEP 2: Add the dependency"
  - type: dropdown
    id: type
    attributes:
      label: Type of issue
      options:
        - Incorrect or outdated information
        - Missing information
        - Unclear / confusing explanation
        - Broken link or example
        - Typo / formatting
        - Other
  - type: textarea
    id: description
    attributes:
      label: Describe the issue
      description: What is wrong, missing, or could be improved?
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: If you have a suggested wording or fix, share it here.
