name: 🐞 Bug Report
description: Report a problem or unexpected behavior with the Adgeist Android SDK.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below so we can reproduce and fix the issue quickly.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched the [existing issues](../issues) and this has not already been reported.
        - label: I am using a supported configuration (minSdk 23+, compileSdk 35+).
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: Which version of `ai.adgeist:adgeistkit` are you using?
      placeholder: "e.g. 1.1.24"
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Initialize the SDK with '...'
        2. Call '...'
        3. Observe '...'
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste any relevant logcat output or stack traces. This will be automatically formatted as code.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment.
      value: |
        - Device / emulator:
        - Android OS version:
        - Android Gradle Plugin version:
        - Kotlin version:
        - IDE (Android Studio version):
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or a minimal sample project.
